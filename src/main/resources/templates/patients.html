<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Пациенты</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
    <h1>Пациенты</h1>
</header>
<main>
    <p><a href="/web/home">Главная</a></p>

    <h2>Добавить пациента</h2>
    <form method="post" action="/patients" th:object="${newPatient}">
        <label>Имя: <input name="firstName" th:value="*{firstName}" required></label><br/>
        <label>Фамилия: <input name="lastName" th:value="*{lastName}" required></label><br/>
        <label>Паспорт: <input name="passportNumber" th:value="*{passportNumber}"></label><br/>
        <label>Телефон: <input name="phone" th:value="*{phone}"></label><br/>
        <label>Email: <input name="email" th:value="*{email}"></label><br/>
        <label>Дата рождения: <input type="date" name="birthDate" th:value="*{birthDate}"></label><br/>
        <button type="submit">Добавить</button>
    </form>

    <h2>Список пациентов</h2>
    <table>
        <thead>
        <tr>
            <th>ID</th><th>ФИО</th><th>Телефон</th><th>Email</th><th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${patients}">
            <td th:text="${p.id}">1</td>
            <td th:text="${p.lastName + ' ' + p.firstName}">ФИО</td>
            <td th:text="${p.phone}">Тел</td>
            <td th:text="${p.email}">Email</td>
            <td>
                <form th:action="@{'/patients/delete/' + ${p.id}}" method="post">
                    <button type="submit">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
