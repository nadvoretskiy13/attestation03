# use env vars set by docker-compose, fallback to defaults for local run
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/hospital}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=8080
springdoc.api-docs.path=/v3/api-docs